name: OSS Safety Check via RL Action

on:
  workflow_dispatch:

jobs:

  OSS-Check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out 
        uses: actions/checkout@v6
        
      - name: OSS Safety Check
        uses: reversinglabs/gh-action-rl-protect-scan@v1
        env:
          # If using Portal API
          # RL_TOKEN: ${{ secrets.RL_PORTAL_TOKEN }}
          # RL_PORTAL_SRV: ${{ secrets.RL_PORTAL_SERVER }}
          # RL_PORTAL_ORG: ${{ secrets.RL_PORTAL_ORGANIZATION }}
          # If using Community API
          RL_TOKEN: ${{ secrets.RL_COMMUNITY_TOKEN }}
        with:        
          # rl-server: ${{env.RL_PORTAL_SRV}}
          # rl-org: ${{env.RL_PORTAL_ORG}}
          scan-path: package.json
          report: oss-safety-report.json
          log-file: rl-protect.log
          log-level: warning
          verbose: true
